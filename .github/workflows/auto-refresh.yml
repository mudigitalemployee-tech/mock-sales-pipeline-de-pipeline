name: Auto Refresh Every 10 Minutes

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install
        run: pip install pandas numpy
          
      - name: Transform
        run: |
          python3 << 'EOF'
          import pandas as pd
          import hashlib
          import json
          import sqlite3
          from datetime import datetime
          
          print(f"🔄 {datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}\n")
          
          DB = "data/sales_auto.db"
          
          def hash_pii(v):
              return hashlib.sha256(str(v).encode()).hexdigest()
          
          # Bronze
          conn = sqlite3.connect(DB)
          df = pd.read_sql_query("SELECT * FROM sales ORDER BY id", conn)
          conn.close()
          df.to_csv("data/bronze_raw.csv", index=False)
          print(f"✅ Bronze: {len(df)} rows")
          
          # Silver
          s = df.copy()
          s['email'] = s['email'].apply(hash_pii)
          s['phone'] = s['phone'].apply(hash_pii)
          s = s.drop_duplicates()
          s.to_csv("data/transformed.csv", index=False)
          print(f"✅ Silver: {len(s)} rows")
          
          # Gold
          s.to_csv("data/gold_aggregated.csv", index=False)
          print(f"✅ Gold: {len(s)} rows")
          
          # DQ
          checks = []
          for c in s.columns:
              null_pct = (s[c].isnull().sum() / len(s)) * 100
              checks.append({"column": c, "null_pct": null_pct, "status": "PASS" if null_pct <= 5 else "FAIL"})
          
          score = (sum(1 for c in checks if c["status"]=="PASS") / len(checks)) * 100
          
          with open("data/dq_scorecard.json", "w") as f:
              json.dump({"dq_score_pct": round(score,1), "dq_status": "PASS" if score>=90 else "FAIL", "checks": checks}, f, indent=2)
          
          print(f"✅ DQ: {score:.1f}%\n")
          EOF
          
      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add data/*.csv data/*.json
            git commit -m "🔄 $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "✅ Pushed"
          else
            echo "ℹ️ No changes"
          fi
